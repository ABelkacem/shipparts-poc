# ═══════════════════════════════════════════════════════
# ShipParts AI Pipeline – Application Configuration
# ═══════════════════════════════════════════════════════

spring.application.name=shipparts-poc

# ── Database (PostgreSQL 16 + pgvector) ─────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/shipparts
spring.datasource.username=shipparts
spring.datasource.password=shipparts
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Flyway Migrations ────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Email (IMAP Listener) ────────────────────────────────
shipparts.email.host=imap.example.com
shipparts.email.port=993
shipparts.email.username=orders@example.com
shipparts.email.password=secret
shipparts.email.folder=INBOX
shipparts.email.poll-interval-ms=60000

# ── LLM (Spring AI – Ollama local OR OpenAI) ────────────
# For Ollama (local, free, recommended for POC):
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=mistral:7b-instruct
spring.ai.ollama.embedding.model=nomic-embed-text

# For OpenAI (comment out Ollama above, uncomment below):
# spring.ai.openai.api-key=${OPENAI_API_KEY}
# spring.ai.openai.chat.options.model=gpt-4o-mini
# spring.ai.openai.embedding.options.model=text-embedding-3-small

# ── Embedding ────────────────────────────────────────────
shipparts.embedding.dimensions=384
shipparts.embedding.model-name=nomic-embed-text

# ── Matching ─────────────────────────────────────────────
shipparts.matching.confidence-threshold=0.85
shipparts.matching.top-k=3

# ── Offer ────────────────────────────────────────────────
shipparts.offer.auto-send-enabled=false   # set true in production
shipparts.offer.from-address=quotes@example.com

# ── Actuator ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── Logging ──────────────────────────────────────────────
logging.level.com.shipparts=DEBUG
logging.level.org.springframework.ai=INFO
