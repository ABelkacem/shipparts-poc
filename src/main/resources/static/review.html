<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>ShipParts — Human Review</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800">

<div x-data="reviewApp()" x-init="init()" class="max-w-7xl mx-auto p-6">

  <!-- Header -->
  <header class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-3xl font-bold text-slate-900">ShipParts — Review Queue</h1>
      <p class="text-sm text-slate-500">KI-gestützte Ersatzteil-Pipeline · Human-in-the-Loop</p>
    </div>
    <div class="flex gap-3 text-sm">
      <div class="bg-white rounded-lg shadow px-4 py-2">
        <div class="text-slate-500">Pending</div>
        <div class="text-2xl font-bold text-amber-600" x-text="stats.pending_review ?? 0"></div>
      </div>
      <div class="bg-white rounded-lg shadow px-4 py-2">
        <div class="text-slate-500">Sent</div>
        <div class="text-2xl font-bold text-emerald-600" x-text="stats.offer_sent ?? 0"></div>
      </div>
      <div class="bg-white rounded-lg shadow px-4 py-2">
        <div class="text-slate-500">Rejected</div>
        <div class="text-2xl font-bold text-rose-600" x-text="stats.rejected ?? 0"></div>
      </div>
      <button @click="refresh()"
              class="bg-slate-900 text-white px-4 py-2 rounded-lg hover:bg-slate-700">
        ⟳ Aktualisieren
      </button>
      <a href="/test.html"
         class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
        ▶ Test-Konsole
      </a>
    </div>
  </header>

  <div class="grid grid-cols-12 gap-6">

    <!-- Queue list -->
    <aside class="col-span-4 bg-white rounded-lg shadow overflow-hidden">
      <div class="px-4 py-3 border-b bg-slate-50 font-semibold">
        Offene Anfragen (<span x-text="queue.length"></span>)
      </div>
      <template x-if="queue.length === 0">
        <div class="p-8 text-center text-slate-400">
          Keine offenen Anfragen. <br>Alles auto-verarbeitet oder erledigt. 🎉
        </div>
      </template>
      <ul class="divide-y max-h-[70vh] overflow-y-auto">
        <template x-for="item in queue" :key="item.anfrageId">
          <li @click="select(item)"
              :class="selected && selected.anfrageId === item.anfrageId
                      ? 'bg-blue-50 border-l-4 border-blue-500'
                      : 'hover:bg-slate-50 border-l-4 border-transparent'"
              class="px-4 py-3 cursor-pointer">
            <div class="flex items-center justify-between">
              <div class="font-medium text-slate-900 truncate"
                   x-text="item.emailSubject || '(kein Betreff)'"></div>
              <span class="text-xs px-2 py-0.5 rounded-full"
                    :class="confidenceColor(topConfidence(item))"
                    x-text="topConfidence(item) != null ? (topConfidence(item)*100).toFixed(0) + '%' : '—'">
              </span>
            </div>
            <div class="text-xs text-slate-500 mt-1 truncate" x-text="item.emailFrom"></div>
            <div class="text-xs text-slate-400 mt-1 truncate" x-text="item.emailBodyRaw?.substring(0,80) + '…'"></div>
          </li>
        </template>
      </ul>
    </aside>

    <!-- Detail -->
    <main class="col-span-8">
      <template x-if="!selected">
        <div class="bg-white rounded-lg shadow p-12 text-center text-slate-400">
          ← Wähle eine Anfrage links aus.
        </div>
      </template>

      <template x-if="selected">
        <div class="space-y-6">

          <!-- Anfrage details -->
          <section class="bg-white rounded-lg shadow p-6">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-bold" x-text="selected.emailSubject"></h2>
              <span class="text-xs bg-slate-200 px-2 py-1 rounded" x-text="selected.status"></span>
            </div>
            <div class="text-sm text-slate-600 mb-3">
              <span class="font-medium">Von:</span> <span x-text="selected.emailFrom"></span>
            </div>
            <div class="bg-slate-50 rounded p-3 text-sm whitespace-pre-wrap"
                 x-text="selected.emailBodyRaw"></div>
            <template x-if="selected.pdfText">
              <div class="mt-3">
                <div class="text-xs font-semibold text-slate-500 uppercase mb-1">
                  PDF (<span x-text="selected.pdfType"></span>)
                </div>
                <div class="bg-slate-50 rounded p-3 text-sm whitespace-pre-wrap max-h-40 overflow-y-auto"
                     x-text="selected.pdfText"></div>
              </div>
            </template>
          </section>

          <!-- KI extraction -->
          <section class="bg-white rounded-lg shadow p-6">
            <h3 class="text-lg font-semibold mb-3">
              🤖 KI-Extraktion
            </h3>
            <table class="w-full text-sm">
              <template x-for="(value, key) in (selected.extraktJson || {})" :key="key">
                <tr class="border-b last:border-0">
                  <td class="py-1 pr-4 text-slate-500 font-mono text-xs" x-text="key"></td>
                  <td class="py-1 font-medium"
                      :class="value ? 'text-slate-900' : 'text-slate-300'"
                      x-text="value ?? '—'"></td>
                </tr>
              </template>
            </table>
          </section>

          <!-- Suggestions -->
          <section class="bg-white rounded-lg shadow p-6">
            <h3 class="text-lg font-semibold mb-3">📦 KI-Vorschläge</h3>
            <template x-for="fb in selected.feedbacks" :key="fb.feedbackId">
              <div class="border rounded-lg p-4 mb-3">
                <div class="flex items-center justify-between mb-2">
                  <div>
                    <span class="font-mono font-bold" x-text="fb.artikelNr"></span>
                  </div>
                  <span class="text-xs px-2 py-1 rounded-full"
                        :class="confidenceColor(fb.konfidenz)"
                        x-text="fb.konfidenz != null ? 'Konfidenz ' + (fb.konfidenz*100).toFixed(0) + '%' : '—'">
                  </span>
                </div>

                <div class="flex flex-wrap gap-2 mt-3">
                  <button @click="confirm(fb.feedbackId)"
                          class="bg-emerald-600 text-white px-4 py-2 rounded hover:bg-emerald-700 text-sm font-medium">
                    ✓ Bestätigen
                  </button>
                  <div class="flex gap-2 items-center">
                    <select x-model="correctionMap[fb.feedbackId]"
                            class="border rounded px-2 py-1.5 text-sm">
                      <option value="">— anderen Artikel wählen —</option>
                      <template x-for="a in artikel" :key="a.id">
                        <option :value="a.id"
                                x-text="a.artikelNr + ' — ' + (a.beschreibung || '')"></option>
                      </template>
                    </select>
                    <button @click="correct(fb.feedbackId)"
                            :disabled="!correctionMap[fb.feedbackId]"
                            class="bg-amber-600 text-white px-4 py-2 rounded hover:bg-amber-700 text-sm font-medium disabled:opacity-40">
                      ✎ Korrigieren
                    </button>
                  </div>
                  <button @click="reject(fb.feedbackId)"
                          class="bg-rose-600 text-white px-4 py-2 rounded hover:bg-rose-700 text-sm font-medium ml-auto">
                    ✕ Ablehnen
                  </button>
                </div>
              </div>
            </template>
            <template x-if="!selected.feedbacks || selected.feedbacks.length === 0">
              <div class="text-slate-400 text-sm">Keine Vorschläge vorhanden.</div>
            </template>
          </section>
        </div>
      </template>
    </main>
  </div>

  <!-- Toast -->
  <div x-show="toast" x-transition
       class="fixed bottom-6 right-6 bg-slate-900 text-white px-5 py-3 rounded-lg shadow-lg"
       x-text="toast"></div>
</div>

<script>
function reviewApp() {
  return {
    queue: [],
    selected: null,
    stats: {},
    artikel: [],
    correctionMap: {},
    toast: '',

    async init() {
      await this.refresh();
      setInterval(() => this.refresh(true), 10000);
    },

    async refresh(silent = false) {
      try {
        const [q, s, a] = await Promise.all([
          fetch('/api/pipeline/queue').then(r => r.json()),
          fetch('/api/admin/stats').then(r => r.json()),
          fetch('/api/artikel').then(r => r.json()),
        ]);
        this.queue = q;
        this.stats = s;
        this.artikel = a;
        if (this.selected) {
          const fresh = q.find(x => x.anfrageId === this.selected.anfrageId);
          this.selected = fresh || null;
        }
        if (!silent) this.showToast('Aktualisiert');
      } catch (e) {
        this.showToast('Fehler: ' + e.message);
      }
    },

    select(item) { this.selected = item; },

    topConfidence(item) {
      const fbs = item.feedbacks || [];
      if (fbs.length === 0) return null;
      return Math.max(...fbs.map(f => f.konfidenz ?? 0));
    },

    confidenceColor(c) {
      if (c == null) return 'bg-slate-200 text-slate-600';
      if (c >= 0.85) return 'bg-emerald-100 text-emerald-700';
      if (c >= 0.6)  return 'bg-amber-100 text-amber-700';
      return 'bg-rose-100 text-rose-700';
    },

    async confirm(id) {
      await this.post(`/api/review/${id}/confirm`, {
        reviewer: 'demo-user', additionalFields: {}, notiz: 'Bestätigt via UI'
      });
      this.showToast('Bestätigt ✓');
      await this.refresh(true);
    },

    async correct(id) {
      const correctId = this.correctionMap[id];
      if (!correctId) return;
      await this.post(`/api/review/${id}/correct`, {
        reviewer: 'demo-user', correctArtikelId: correctId,
        additionalFields: {}, notiz: 'Korrigiert via UI'
      });
      this.showToast('Korrigiert ✎');
      await this.refresh(true);
    },

    async reject(id) {
      await this.post(`/api/review/${id}/reject`, {
        reviewer: 'demo-user', additionalFields: {}, notiz: 'Abgelehnt via UI'
      });
      this.showToast('Abgelehnt ✕');
      await this.refresh(true);
    },

    async post(url, body) {
      const r = await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    },

    showToast(msg) {
      this.toast = msg;
      setTimeout(() => this.toast = '', 2500);
    }
  };
}
</script>
</body>
</html>
