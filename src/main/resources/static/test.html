<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>ShipParts — Test Console</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800">

<div x-data="testApp()" x-init="init()" class="max-w-7xl mx-auto p-6">

  <header class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-3xl font-bold text-slate-900">ShipParts — Test Console</h1>
      <p class="text-sm text-slate-500">Vordefinierte Use-Case-Szenarien für die Demo</p>
    </div>
    <div class="flex gap-2">
      <a href="/review.html"
         class="bg-slate-900 text-white px-4 py-2 rounded-lg hover:bg-slate-700 text-sm">
        → Zur Review-Queue
      </a>
    </div>
  </header>

  <div class="grid grid-cols-12 gap-6">

    <!-- Scenarios -->
    <aside class="col-span-5 space-y-3">
      <h2 class="text-lg font-semibold mb-2">Szenarien</h2>
      <template x-for="(s, idx) in scenarios" :key="idx">
        <div @click="selectScenario(idx)"
             :class="selectedIdx === idx
                     ? 'bg-blue-50 border-blue-500 border-2'
                     : 'bg-white border border-slate-200 hover:border-slate-400'"
             class="rounded-lg p-4 cursor-pointer transition">
          <div class="flex items-start justify-between">
            <div>
              <div class="flex items-center gap-2">
                <span class="text-xs font-bold px-2 py-0.5 rounded"
                      :class="badgeColor(s.expectedConfidence)"
                      x-text="s.code"></span>
                <span class="font-semibold" x-text="s.title"></span>
              </div>
              <p class="text-sm text-slate-500 mt-1" x-text="s.description"></p>
            </div>
            <span class="text-xs whitespace-nowrap text-slate-400"
                  x-text="s.expectedConfidence"></span>
          </div>
        </div>
      </template>
    </aside>

    <!-- Editor + run -->
    <main class="col-span-7">
      <template x-if="!selected">
        <div class="bg-white rounded-lg shadow p-12 text-center text-slate-400">
          ← Wähle ein Szenario links aus.
        </div>
      </template>

      <template x-if="selected">
        <div class="bg-white rounded-lg shadow p-6 space-y-4">
          <div>
            <h2 class="text-xl font-bold" x-text="selected.title"></h2>
            <p class="text-sm text-slate-500" x-text="selected.description"></p>
            <p class="text-xs mt-2 text-slate-600">
              <span class="font-medium">Erwartetes Ergebnis:</span>
              <span x-text="selected.expectedResult"></span>
            </p>
          </div>

          <hr>

          <div>
            <label class="text-xs font-semibold text-slate-500 uppercase">Absender</label>
            <input x-model="form.from"
                   class="mt-1 w-full border rounded px-3 py-2 text-sm font-mono"/>
          </div>

          <div>
            <label class="text-xs font-semibold text-slate-500 uppercase">Betreff</label>
            <input x-model="form.subject"
                   class="mt-1 w-full border rounded px-3 py-2 text-sm"/>
          </div>

          <div>
            <label class="text-xs font-semibold text-slate-500 uppercase">E-Mail-Body</label>
            <textarea x-model="form.emailBody" rows="6"
                      class="mt-1 w-full border rounded px-3 py-2 text-sm font-mono"></textarea>
          </div>

          <div>
            <label class="text-xs font-semibold text-slate-500 uppercase">PDF-Anhang (optional)</label>
            <input type="file" accept="application/pdf"
                   @change="form.pdf = $event.target.files[0]"
                   class="mt-1 w-full text-sm"/>
            <template x-if="form.pdf">
              <p class="text-xs text-emerald-600 mt-1"
                 x-text="'✓ ' + form.pdf.name + ' (' + Math.round(form.pdf.size/1024) + ' KB)'"></p>
            </template>
          </div>

          <div class="flex items-center gap-3 pt-2">
            <button @click="submit()" :disabled="running"
                    class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 disabled:opacity-50 font-medium">
              <span x-show="!running">▶ Pipeline starten</span>
              <span x-show="running">⏳ Verarbeite...</span>
            </button>
            <button @click="resetForm()"
                    class="text-slate-500 hover:text-slate-900 text-sm">
              Zurücksetzen
            </button>
          </div>

          <template x-if="result">
            <div class="mt-4 border-t pt-4">
              <h3 class="font-semibold mb-2">Ergebnis</h3>
              <div class="bg-slate-900 text-emerald-300 rounded p-3 text-xs font-mono overflow-x-auto whitespace-pre"
                   x-text="JSON.stringify(result, null, 2)"></div>
              <div class="mt-3 flex gap-2">
                <a :href="'/review.html'" target="_blank"
                   class="text-sm text-blue-600 hover:underline">→ In Review-Queue ansehen</a>
              </div>
            </div>
          </template>

          <template x-if="error">
            <div class="mt-4 bg-rose-100 text-rose-800 rounded p-3 text-sm" x-text="error"></div>
          </template>
        </div>
      </template>
    </main>
  </div>

  <!-- Toast -->
  <div x-show="toast" x-transition
       class="fixed bottom-6 right-6 bg-slate-900 text-white px-5 py-3 rounded-lg shadow-lg"
       x-text="toast"></div>
</div>

<script>
function testApp() {
  return {
    scenarios: [
      {
        code: 'UC-1',
        title: 'Direkter Treffer (exakte Artikel-Nr)',
        description: 'Kunde nennt exakte Part-Nummer aus dem Katalog.',
        expectedConfidence: '1.0',
        expectedResult: 'READY_TO_SEND – kein Review nötig, direkter Match auf WAR-FIV-2234',
        from: 'captain@vessel.com',
        subject: 'Spare part order',
        emailBody: 'Please send offer for article number WAR-FIV-2234, quantity 2 pieces, urgent.',
      },
      {
        code: 'UC-2a',
        title: 'Vage Beschreibung (Deutsch)',
        description: 'Freitext ohne Artikel-Nr → semantische Suche.',
        expectedConfidence: '0.5 – 0.85',
        expectedResult: 'REVIEW_PENDING – KI schlägt MAN-BR-7710 vor, Mensch bestätigt',
        from: 'chief@vessel.com',
        subject: 'Ersatzteil benötigt',
        emailBody: 'Hallo, wir brauchen ein Turbolader-Lager für unseren MAN B&W Motor, Baujahr 2018. Bitte um Angebot.',
      },
      {
        code: 'UC-2b',
        title: 'Synonym in Englisch',
        description: '"injection pump" statt "Einspritzpumpe".',
        expectedConfidence: '0.6 – 0.85',
        expectedResult: 'REVIEW_PENDING – Semantik findet Wartsila-Match trotz Sprachwechsel',
        from: 'engineer@vessel.com',
        subject: 'Need injection pump',
        emailBody: 'We need an injection pump for Wartsila RT-flex58T engine. Please quote.',
      },
      {
        code: 'UC-3',
        title: 'Anfrage mit PDF-Anhang',
        description: 'E-Mail-Body verweist nur auf PDF. PDF wählen!',
        expectedConfidence: 'abhängig von PDF',
        expectedResult: 'Pipeline liest PDF-Text aus, kombiniert mit Body, extrahiert.',
        from: 'ops@vessel.com',
        subject: 'Bestellanfrage Q4',
        emailBody: 'Sehr geehrte Damen und Herren, anbei unsere Bestellanfrage als PDF.',
      },
      {
        code: 'UC-Spam',
        title: 'Unbrauchbare Anfrage (Reject-Kandidat)',
        description: 'Kein verwertbarer Inhalt → Reviewer sollte ablehnen.',
        expectedConfidence: '< 0.3',
        expectedResult: 'REVIEW_PENDING – Reviewer klickt "Ablehnen"',
        from: 'unknown@gmail.com',
        subject: 'Hi',
        emailBody: 'Hi, do you have parts? Thanks.',
      },
      {
        code: 'UC-Multi',
        title: 'Mehrere Artikel in einer Anfrage',
        description: 'Kunde fragt mehrere Teile gleichzeitig an.',
        expectedConfidence: 'variabel',
        expectedResult: 'KI extrahiert ersten/wichtigsten Artikel; weitere Items werden in Notiz vermerkt',
        from: 'purchasing@shipping.com',
        subject: 'Multi-item RFQ',
        emailBody: 'Dear ShipParts team,\n\nplease quote:\n1) WAR-FIV-2234 — 2 pcs\n2) MAN-BR-7710 — 4 pcs\n3) Cooling pump for Wartsila RT-flex\n\nDelivery to Hamburg port, Friday.',
      },
      {
        code: 'UC-Urgent',
        title: 'Dringlichkeits-Signal',
        description: 'Wörter wie "urgent" / "asap" werden erkannt.',
        expectedConfidence: '0.7 – 1.0',
        expectedResult: 'Extrakt enthält dringlichkeit=URGENT (priorisiert in Queue)',
        from: 'captain@tanker.com',
        subject: 'URGENT spare part needed',
        emailBody: 'URGENT — vessel stuck in port. Need Part-Nr MAN-BR-7710 ASAP for delivery to Rotterdam tomorrow.',
      },
    ],

    selectedIdx: null,
    selected: null,
    form: { from: '', subject: '', emailBody: '', pdf: null },
    result: null,
    error: '',
    running: false,
    toast: '',

    init() { this.selectScenario(0); },

    selectScenario(idx) {
      this.selectedIdx = idx;
      this.selected    = this.scenarios[idx];
      this.form        = {
        from: this.selected.from,
        subject: this.selected.subject,
        emailBody: this.selected.emailBody,
        pdf: null,
      };
      this.result = null;
      this.error  = '';
    },

    resetForm() {
      if (this.selectedIdx != null) this.selectScenario(this.selectedIdx);
    },

    badgeColor(c) {
      if (c.startsWith('1.0')) return 'bg-emerald-100 text-emerald-700';
      if (c.startsWith('0.')) return 'bg-amber-100 text-amber-700';
      if (c.startsWith('<'))  return 'bg-rose-100 text-rose-700';
      return 'bg-slate-100 text-slate-600';
    },

    async submit() {
      this.running = true;
      this.error   = '';
      this.result  = null;
      try {
        const fd = new FormData();
        fd.append('from',      this.form.from);
        fd.append('subject',   this.form.subject);
        fd.append('emailBody', this.form.emailBody);
        if (this.form.pdf) fd.append('pdf', this.form.pdf);

        const r = await fetch('/api/pipeline/process', { method: 'POST', body: fd });
        if (!r.ok) throw new Error('HTTP ' + r.status + ' — ' + (await r.text()));
        this.result = await r.json();
        this.showToast('Pipeline ausgeführt ✓');
      } catch (e) {
        this.error = e.message;
        this.showToast('Fehler ✕');
      } finally {
        this.running = false;
      }
    },

    showToast(msg) {
      this.toast = msg;
      setTimeout(() => this.toast = '', 2500);
    },
  };
}
</script>
</body>
</html>
